name: Deploy Client to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'davinci-code-web/client/**'
      - 'davinci-code-web/shared/**'
      - 'davinci-code-web/scripts/build-client-pages.mjs'
      - 'davinci-code-web/package.json'
      - 'davinci-code-web/package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: davinci-code-web/package-lock.json

      - name: Install and build for Pages
        working-directory: davinci-code-web
        env:
          VITE_SOCKET_URL: ${{ vars.VITE_SOCKET_URL || 'https://davincicode-coda.onrender.com' }}
        run: npm ci && npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: davinci-code-web/client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
