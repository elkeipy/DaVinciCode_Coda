services:
  postgres:
    image: postgres:16-alpine
    container_name: davinci-postgres-dev
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: davinci
      POSTGRES_PASSWORD: davinci
      POSTGRES_DB: davinci_dev
    volumes:
      - davinci_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U davinci -d davinci_dev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  davinci_pg_data:
